name: Keep Streamlit App Alive

on:
  schedule:
    # Runs twice daily at 08:00 and 20:00 UTC to prevent Streamlit Community Cloud sleep
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Wake Streamlit App
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Wake places-ops.streamlit.app
        run: |
          cat > wake.js << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();

            try {
              console.log('Navigating to app...');
              await page.goto('https://places-ops.streamlit.app/', {
                waitUntil: 'domcontentloaded',
                timeout: 60000,
              });

              const selectors = [
                'text="Yes, get this app back up!"',
                'button:has-text("get this app back up")',
                'button:has-text("Wake")',
              ];

              let clicked = false;
              for (const sel of selectors) {
                const btn = page.locator(sel).first();
                if (await btn.isVisible({ timeout: 3000 }).catch(() => false)) {
                  console.log(`Sleep screen detected. Clicking: ${sel}`);
                  await btn.click();
                  clicked = true;
                  break;
                }
              }

              if (clicked) {
                console.log('Wake button clicked. Waiting 45s for app to boot...');
                await page.waitForTimeout(45000);
                console.log('App should be awake.');
              } else {
                console.log('App is already awake — no sleep screen detected.');
              }

            } finally {
              await browser.close();
            }
          })().catch(err => {
            console.error('Error:', err.message);
            process.exit(1);
          });
          EOF
          node wake.js
