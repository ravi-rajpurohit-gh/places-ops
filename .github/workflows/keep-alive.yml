name: Keep Streamlit App Alive

on:
  schedule:
    # Runs twice daily at 08:00 and 20:00 UTC to prevent Streamlit Community Cloud sleep
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Wake Streamlit App
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright + Chromium
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Wake places-ops.streamlit.app
        run: |
          cat > wake.js << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();

            try {
              console.log('Navigating to app...');
              await page.goto('https://places-ops.streamlit.app/', {
                waitUntil: 'load',
                timeout: 60000,
              });

              // Let Streamlit's React shell finish rendering (sleep screen is JS-rendered)
              await page.waitForTimeout(8000);

              console.log(`Page URL after load: ${page.url()}`);
              console.log(`Page title: ${await page.title()}`);

              // waitForSelector gives the button up to 20s to appear after the initial wait
              let clicked = false;
              try {
                const wakeBtn = await page.waitForSelector(
                  'button:has-text("get this app back up"), button:has-text("Wake"), button:has-text("Yes")',
                  { timeout: 20000 }
                );
                if (wakeBtn) {
                  const label = await wakeBtn.innerText().catch(() => '?');
                  console.log(`Sleep screen detected. Clicking button: "${label}"`);
                  await wakeBtn.click();
                  clicked = true;
                }
              } catch {
                // no sleep button found within timeout — app is already awake
              }

              if (clicked) {
                console.log('Wake button clicked. Waiting 45s for app to boot...');
                await page.waitForTimeout(45000);
                console.log('App should be awake.');
              } else {
                console.log('App is already awake — no sleep screen detected.');
              }

            } finally {
              await browser.close();
            }
          })().catch(err => {
            console.error('Error:', err.message);
            process.exit(1);
          });
          EOF
          node wake.js
