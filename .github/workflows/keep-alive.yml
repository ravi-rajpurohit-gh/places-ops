name: Keep Streamlit App Alive

on:
  schedule:
    # Runs twice daily at 08:00 and 20:00 UTC to prevent Streamlit Community Cloud sleep
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Streamlit App
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping places-ops.streamlit.app
        run: |
          # -L follows redirects to trigger wake-up (Streamlit returns 303 when sleeping).
          # --max-redirs 10 prevents infinite loops; exit code 47 (too many redirects)
          # still means we reached Streamlit and the app is waking up — treat as success.
          CURL_CODE=0
          curl -s -o /dev/null -L --max-redirs 10 --max-time 60 \
            https://places-ops.streamlit.app/ || CURL_CODE=$?

          if [ "$CURL_CODE" -eq 47 ]; then
            echo "Redirect limit reached — app was pinged and is waking up."
          elif [ "$CURL_CODE" -ne 0 ]; then
            echo "curl failed with exit code $CURL_CODE"
            exit 1
          else
            echo "App is alive."
          fi
